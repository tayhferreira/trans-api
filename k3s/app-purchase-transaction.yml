apiVersion: apps/v1
kind: Deployment
metadata:
  name: purchase-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: purchase-api
  template:
    metadata:
      labels:
        app: purchase-api
    spec:
      imagePullSecrets:
        - name: mgc-registry
      containers:
        - name: purchase-api
          image: DOCKER_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 25   
            periodSeconds: 10
            failureThreshold: 5       
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 35
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: purchase-api
spec:
  type: NodePort
  selector:
    app: purchase-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000